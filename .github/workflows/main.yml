name: Daily_Stock_Analysis

on:
  schedule:
    # 每天台灣時間 15:30 執行 (UTC 07:30)
    - cron: '30 7 * * *'
  workflow_dispatch: # 讓你可以隨時點按鈕手動執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 複製專案代碼
        uses: actions/checkout@v4  # 順便幫你升級到 v4 更穩定

      - name: 2. 設定 Python 環境
        uses: actions/setup-python@v5  # 順便幫你升級到 v5
        with:
          python-version: '3.9'

      - name: 3. 安裝搬貨工具 (yfinance 等)
        run: |
          pip install yfinance pandas
          # 如果你有 requirements.txt，也可以用 pip install -r requirements.txt

      - name: 4. 執行 AI 分析師 V7.0
        # 注意：這裡的 main.py 必須跟你 GitHub 上的檔案名稱一模一樣
        run: python main.py > report.txt

      - name: 5. 上傳分析戰報 (解決報錯關鍵)
        uses: actions/upload-artifact@v4  # <-- 這裡已經幫你改成最新的 v4 了
        with:
          name: stock-report
          path: report.txt
